name: weekly-storage-monitor

on:
  schedule:
    - cron: "0 10 * * 0"
    - cron: "0 11 * * 0"
  workflow_dispatch:

jobs:
  weekly-full:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          playwright install --with-deps

      - name: Timezone guard for Sunday 6:00 AM America/New_York
        id: gate
        run: |
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          now = datetime.now(ZoneInfo("America/New_York"))
          should_run = now.weekday() == 6 and now.hour == 6 and now.minute == 0
          print(f"Local time: {now.isoformat()}")
          print(f"should_run={str(should_run).lower()}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"should_run={'true' if should_run else 'false'}\n")
          PY

      - name: Run weekly crawl
        if: steps.gate.outputs.should_run == 'true'
        run: storage-monitor weekly-full

      - name: Upload crawl outputs
        if: steps.gate.outputs.should_run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-storage-monitor-${{ github.run_id }}
          path: |
            data/reports/**
            data/processed/**
            data/raw/**
            data/storage_monitor.duckdb
          if-no-files-found: warn
          retention-days: 30

      - name: Skip outside local run window
        if: steps.gate.outputs.should_run != 'true'
        run: echo "Skipped because the current local time is not Sunday 6:00 AM America/New_York."
